global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: innflow
    environment: local

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: control-api
    metrics_path: /metrics
    static_configs:
      - targets: ['control-api:4000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: control-api

  - job_name: mock-pms
    metrics_path: /metrics
    static_configs:
      - targets: ['mock-pms:3001']
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: mock-pms

  - job_name: workflow-worker
    metrics_path: /metrics
    static_configs:
      - targets: ['workflow-worker:9464']
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: workflow-worker

  - job_name: browser-worker
    metrics_path: /metrics
    static_configs:
      - targets: ['browser-worker:9464']
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: browser-worker
