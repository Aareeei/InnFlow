services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: innflow
      POSTGRES_PASSWORD: innflow
      POSTGRES_DB: innflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U innflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.25.2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: innflow
      POSTGRES_PWD: innflow
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    volumes:
      - ./infrastructure/docker/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:2.31.2
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8233:8080"

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: innflow
      MINIO_ROOT_PASSWORD: innflowsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set innflow http://minio:9000 innflow innflowsecret;
      mc mb innflow/innflow-artifacts --ignore-existing;
      mc anonymous set none innflow/innflow-artifacts;
      exit 0;
      "

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infrastructure/observability/otel-collector/config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      - jaeger
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.64.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14268:14268"

  prometheus:
    image: prom/prometheus:v3.1.0
    volumes:
      - ./infrastructure/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infrastructure/observability/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/observability/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3002:3000"
    depends_on:
      - prometheus

  control-api:
    build:
      context: .
      dockerfile: infrastructure/docker/control-api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://innflow:innflow@postgres:5432/innflow?schema=public
      REDIS_URL: redis://redis:6379
      TEMPORAL_ADDRESS: temporal:7233
      S3_ENDPOINT: http://minio:9000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  workflow-worker:
    build:
      context: .
      dockerfile: infrastructure/docker/workflow-worker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://innflow:innflow@postgres:5432/innflow?schema=public
      REDIS_URL: redis://redis:6379
      TEMPORAL_ADDRESS: temporal:7233
      S3_ENDPOINT: http://minio:9000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
      control-api:
        condition: service_healthy

  browser-worker:
    build:
      context: .
      dockerfile: infrastructure/docker/browser-worker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://innflow:innflow@postgres:5432/innflow?schema=public
      REDIS_URL: redis://redis:6379
      TEMPORAL_ADDRESS: temporal:7233
      S3_ENDPOINT: http://minio:9000
      MOCK_PMS_URL: http://mock-pms:3001
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
      mock-pms:
        condition: service_healthy

  mock-pms:
    build:
      context: .
      dockerfile: infrastructure/docker/mock-pms/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://innflow:innflow@postgres:5432/innflow?schema=public
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  dashboard:
    build:
      context: .
      dockerfile: infrastructure/docker/dashboard/Dockerfile
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      API_URL: http://control-api:4000
    ports:
      - "3000:3000"
    depends_on:
      control-api:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:
