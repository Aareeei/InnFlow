apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-api
  labels:
    app.kubernetes.io/name: control-api
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: control-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: control-api
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: control-api
          image: innflow/control-api:latest
          ports:
            - name: http
              containerPort: 4000
          envFrom:
            - configMapRef:
                name: innflow-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: innflow-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: innflow-secrets
                  key: redis-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: innflow-secrets
                  key: jwt-secret
            - name: TEMPORAL_ADDRESS
              value: temporal.innflow.svc.cluster.local:7233
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.innflow.svc.cluster.local:4318
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
