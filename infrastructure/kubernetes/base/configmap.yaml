apiVersion: v1
kind: ConfigMap
metadata:
  name: innflow-config
data:
  NODE_ENV: production
  LOG_LEVEL: info
  TEMPORAL_NAMESPACE: default
  S3_BUCKET: innflow-artifacts
  S3_REGION: us-east-1
  S3_FORCE_PATH_STYLE: "true"
  AI_PROVIDER: mock
  OTEL_SERVICE_NAME: innflow
  CORS_ORIGINS: http://localhost:3000
