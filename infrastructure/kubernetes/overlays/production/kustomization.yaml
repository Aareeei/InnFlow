apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: control-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: workflow-worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 4
  - target:
      kind: Deployment
      name: browser-worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: dashboard
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3

configMapGenerator:
  - name: innflow-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - AI_PROVIDER=openai
