apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-pms
  labels:
    app.kubernetes.io/name: mock-pms
    app.kubernetes.io/component: pms
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mock-pms
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mock-pms
        app.kubernetes.io/component: pms
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: mock-pms
          image: innflow/mock-pms:latest
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - configMapRef:
                name: innflow-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: innflow-secrets
                  key: database-url
            - name: PORT
              value: "3001"
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
